name: Build TWA APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build TWA with Bubblewrap
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        run: |
          npm install -g @bubblewrap/cli

          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'CONFIG'
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          CONFIG

          mkdir twa && cd twa

          printf '\n\n\n\n\n' | bubblewrap init \
            --manifest https://omusubi-panda.pages.dev/manifest.json \
            --directory . \
            --packageId com.omupan.app \
            --appVersion 1 \
            --appVersionName "1.0.0" \
            --signingKeyPath ./android.keystore \
            --signingKeyAlias android \
            --signingKeyPassword "$KEY_PASSWORD" \
            --signingStorePassword "$KEY_STORE_PASSWORD" \
            --displayMode standalone \
            --host omusubi-panda.pages.dev \
            --startUrl / \
            --themeColor "#7aaa5a" \
            --backgroundColor "#fffaf0"

          bubblewrap build --skipPwaValidation

      - name: Upload keystore (保管用)
        uses: actions/upload-artifact@v4
        with:
          name: omupan-keystore
          path: twa/android.keystore
          retention-days: 90

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: omupan-apk
          path: twa/app-release-signed.apk
          retention-days: 30
